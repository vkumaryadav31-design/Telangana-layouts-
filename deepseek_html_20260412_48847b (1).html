<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Uploader</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f7fc;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }
    .sub {
      color: #475569;
      margin-bottom: 2rem;
      border-left: 4px solid #3b82f6;
      padding-left: 1rem;
    }
    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      background: #f8fafc;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 1.5rem;
    }
    .drop-zone.drag-over {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .preview-area {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1.5rem;
      min-height: 80px;
    }
    .preview-item {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .preview-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
    }
    .metadata input, .metadata textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      font-size: 1rem;
      font-family: inherit;
    }
    .metadata textarea {
      resize: vertical;
      min-height: 80px;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
    }
    button:hover {
      background: #2563eb;
    }
    .message {
      margin-top: 1rem;
      padding: 12px;
      border-radius: 16px;
      text-align: center;
      font-weight: 500;
    }
    .success {
      background: #dcfce7;
      color: #166534;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📐 Layout Uploader</h1>
  <div class="sub">Drag & drop your designs (images, .zip, .svg, .cad)</div>

  <div class="drop-zone" id="dropZone">
    📁 Drag files here or click to browse
    <input type="file" id="fileInput" multiple hidden accept=".jpg,.jpeg,.png,.svg,.gif,.zip,.pdf,.cad">
  </div>

  <div id="preview" class="preview-area"></div>

  <div class="metadata">
    <input type="text" id="title" placeholder="Layout title *" autocomplete="off">
    <textarea id="description" placeholder="Description (optional)"></textarea>
    <input type="text" id="tags" placeholder="Tags (comma separated, e.g. modern, kitchen, 3d)">
  </div>

  <button id="uploadBtn">🚀 Upload to server</button>
  <div id="messageBox"></div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const previewDiv = document.getElementById('preview');
  const uploadBtn = document.getElementById('uploadBtn');
  const messageBox = document.getElementById('messageBox');

  let selectedFiles = [];

  // ----- DRAG & DROP -----
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files);
    if (files.length) addFiles(files);
  });

  fileInput.addEventListener('change', (e) => {
    addFiles(Array.from(e.target.files));
    fileInput.value = ''; // allow re-upload same file
  });

  function addFiles(files) {
    selectedFiles.push(...files);
    renderPreview();
  }

  function renderPreview() {
    previewDiv.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
      const div = document.createElement('div');
      div.className = 'preview-item';
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        div.appendChild(img);
      } else {
        const iconSpan = document.createElement('span');
        iconSpan.textContent = '📄';
        div.appendChild(iconSpan);
      }
      const nameSpan = document.createElement('span');
      nameSpan.textContent = file.name.length > 30 ? file.name.slice(0, 27) + '...' : file.name;
      div.appendChild(nameSpan);
      const removeBtn = document.createElement('button');
      removeBtn.textContent = '✖';
      removeBtn.style.background = '#e2e8f0';
      removeBtn.style.color = '#1e293b';
      removeBtn.style.padding = '4px 8px';
      removeBtn.style.width = 'auto';
      removeBtn.style.marginLeft = 'auto';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        selectedFiles.splice(idx, 1);
        renderPreview();
      };
      div.appendChild(removeBtn);
      previewDiv.appendChild(div);
    });
    if (selectedFiles.length === 0) {
      previewDiv.innerHTML = '<div style="color:#94a3b8; font-size:0.9rem;">✨ No files selected</div>';
    }
  }

  // ----- UPLOAD FUNCTION -----
  async function uploadFiles() {
    const title = document.getElementById('title').value.trim();
    if (!title) {
      showMessage('Please enter a title', 'error');
      return;
    }
    if (selectedFiles.length === 0) {
      showMessage('Please select at least one file', 'error');
      return;
    }

    const formData = new FormData();
    formData.append('title', title);
    formData.append('description', document.getElementById('description').value);
    const tagsRaw = document.getElementById('tags').value;
    const tagsArr = tagsRaw.split(',').map(t => t.trim()).filter(t => t);
    formData.append('tags', JSON.stringify(tagsArr));

    for (const file of selectedFiles) {
      formData.append('files', file);
    }

    showMessage('⏳ Uploading...', 'info');
    try {
      const response = await fetch('/upload', {
        method: 'POST',
        body: formData
      });
      const data = await response.json();
      if (data.success) {
        showMessage(`✅ ${data.message}`, 'success');
        // reset form
        selectedFiles = [];
        renderPreview();
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('tags').value = '';
      } else {
        showMessage('❌ Upload failed', 'error');
      }
    } catch (err) {
      console.error(err);
      showMessage('❌ Server error. Make sure backend is running.', 'error');
    }
  }

  function showMessage(msg, type) {
    messageBox.innerHTML = `<div class="message ${type === 'success' ? 'success' : 'error'}">${msg}</div>`;
    setTimeout(() => {
      if (messageBox.firstChild) messageBox.removeChild(messageBox.firstChild);
    }, 4000);
  }

  uploadBtn.addEventListener('click', uploadFiles);
  renderPreview();
</script>
</body>
</html>
